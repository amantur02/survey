<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета для самой интересной девушки 🐱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ffe0f0 0%, #fff5e6 50%, #e0f0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.5);
            text-align: center;
            position: relative;
        }

        .progress-wrapper { margin-bottom: 25px; }
        .progress-label { font-size: 0.85em; color: #b5a3c9; margin-bottom: 8px; }
        .progress-bar { background: #e8dff0; border-radius: 20px; height: 8px; width: 100%; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #ff9a9e, #fad0c4); height: 100%; border-radius: 20px; transition: width 0.5s ease; width: 0%; }

        .screen { display: none; animation: fadeSlideIn 0.5s ease; }
        .screen.active { display: block; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.08); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes sparkleFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.3); }
        }

        h1 { font-size: 1.8em; color: #4a3f6b; margin-bottom: 10px; line-height: 1.3; }
        h2 { font-size: 1.4em; color: #5e548e; margin-bottom: 20px; font-weight: 500; }
        p { color: #6b5b7b; font-size: 1.05em; margin-bottom: 18px; line-height: 1.5; }
        .subtitle { font-size: 0.9em; color: #b5a3c9; margin-bottom: 20px; font-style: italic; }

        .emoji-big { font-size: 60px; display: block; animation: float 3s ease-in-out infinite; margin-bottom: 15px; }
        .emoji-medium { font-size: 40px; }

        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .quiz-option {
            background: white;
            border: 2px solid #e8dff0;
            border-radius: 18px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            color: #4a3f6b;
            font-weight: 500;
            flex: 1 1 140px;
            max-width: 220px;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            text-align: center;
        }
        .quiz-option:hover {
            border-color: #c3b0d6;
            background: #fdfaff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .quiz-option.selected {
            border-color: #ff9a9e;
            background: #fff0f0;
            box-shadow: 0 0 0 4px rgba(255,154,158,0.2);
            font-weight: 600;
        }

        .other-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 2px solid #e8dff0;
            font-size: 0.95em;
            font-family: inherit;
            background: white;
            transition: all 0.2s ease;
            color: #4a3f6b;
            margin-top: 8px;
            display: none;
        }
        .other-input:focus {
            outline: none;
            border-color: #ff9a9e;
            box-shadow: 0 0 0 4px rgba(255,154,158,0.15);
        }
        .other-input.visible { display: block; }

        .text-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 18px;
            border: 2px solid #e8dff0;
            font-size: 1em;
            font-family: inherit;
            background: white;
            transition: all 0.2s ease;
            color: #4a3f6b;
            margin-bottom: 10px;
            resize: vertical;
        }
        .text-input:focus {
            outline: none;
            border-color: #ff9a9e;
            box-shadow: 0 0 0 4px rgba(255,154,158,0.15);
        }

        input[type="date"] {
            padding: 14px 18px;
            border-radius: 18px;
            border: 2px solid #e8dff0;
            font-size: 1em;
            font-family: inherit;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4a3f6b;
            margin: 8px;
        }
        input[type="date"]:focus {
            outline: none;
            border-color: #ff9a9e;
            box-shadow: 0 0 0 4px rgba(255,154,158,0.15);
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-next {
            background: #d4c5e2;
            color: #3d2c5e;
        }
        .btn-next:hover { background: #c3b0d6; transform: translateY(-2px); }
        .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-submit {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #4a2c2c;
            box-shadow: 0 8px 25px rgba(255,154,158,0.4);
            padding: 16px 35px;
            font-size: 1.2em;
        }
        .btn-submit:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); }
        .btn-submit:active:not(:disabled) { transform: scale(0.96); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .birthday-hint {
            background: #fff0f0;
            border-radius: 15px;
            padding: 12px 18px;
            margin: 15px 0;
            font-size: 0.95em;
            color: #b55a5a;
            display: inline-block;
        }
        .age-diff {
            background: #f0f0ff;
            border-radius: 15px;
            padding: 10px 16px;
            margin: 10px 0;
            font-size: 0.9em;
            color: #5e548e;
            display: none;
        }
        .age-diff.visible { display: inline-block; }

        .firework {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .sending-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.7);
            z-index: 9998;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 1.5em;
            color: #4a3f6b;
        }
        .sending-overlay.visible { display: flex; }

        @media (max-width: 500px) {
            .container { padding: 20px 15px; border-radius: 24px; }
            h1 { font-size: 1.4em; }
            h2 { font-size: 1.2em; }
            .quiz-option { font-size: 0.85em; padding: 10px 14px; }
            .btn { padding: 12px 22px; font-size: 1em; }
            .emoji-big { font-size: 45px; }
        }
    </style>
</head>
<body>
    <div class="sending-overlay" id="sendingOverlay">
        <span>Отправляю анкету... 💫</span>
    </div>

    <div class="container" id="appContainer">

        <div class="progress-wrapper">
            <div class="progress-label" id="progressLabel">Вопрос 1 из 21</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="screensContainer"></div>

        <div class="screen" id="screen-final">
            <span class="emoji-big" style="animation: bounceIn 0.8s ease;">🎉</span>
            <h1>Спасибо, что ответила!</h1>
            <p style="font-size: 1.1em;">
                Теперь я знаю о тебе чуточку больше 💖<br>
                Обещаю использовать эту информацию только в благих целях!
            </p>
            <p style="font-size: 0.9em; color: #b5a3c9;">
                P.S. Если что — я уже планирую кое-что интересное... 🐱✨
            </p>
            <button class="btn btn-submit" onclick="launchFireworks()">
                Запустить салют 🎆
            </button>
            <canvas id="fireworkCanvas" class="firework" style="display: none;"></canvas>
        </div>

    </div>

    <script>
        // Дата рождения автора анкеты
        const MY_BIRTHDAY = new Date(2002, 10, 19); // 19.11.2002 (месяцы с 0)

        const quizData = [
            // Экран 1 (вопросы 1-3)
            {

                    },
                    {

                        options: [
                            "🦸‍♀️ Телепортация",

                        ],

                    }
                ]
            },
            // Экран 2 (вопросы 4-7)
            {
                title: "🍽️ Блок 2: Вкусовщина",
                subtitle: "Чтобы знать, чем угощать",
                questions: [
                    {
                        id: "q4_cuisine",

                        options: [
                            "🍣 Японская",

                    },
                    {

                            "☕ Кофе — и побольше!",
                            "🍵 Чай — у меня целая коллекция",
                            "🍫 Какао / Горячий шоколад",
                            "🥤 Ни то, ни другое, я за смузи/сок"
                        ],
                        hasOther: true
                    },
                    {
                        id: "q6_snack",
                        text: "6. Лучший перекус в течение дня:",

                        options: [
                            "🍫 Шоколадка",
                            "🍓 Фрукты / Ягоды",

                        ],
                        hasOther: true
                    },
                    {
                        id: "q7_sweet_salty",
                        text: "7. Сладкое или солёное?",
                        type: "single",
                        options: [
                            "🍰 Только сладкое",
                            "🍟 Только солёное",
                            "🥨 Солёная карамель — идеальный баланс",
                            "🥒 Я за ЗОЖ, увы"
                        ],
                        hasOther: true
                    }
                ]
            },
            // Экран 3 (вопросы 8-10)
            {
                title: "🎯 Блок 3: Досуг и интересы",
                subtitle: "Чтобы планировать идеальные выходные",
                questions: [
                    {
                        id: "q8_date",
                        text: "8. Идеальное свидание — это...",

                            "🎬 Кино под одеялом",

                    },
                    {

                        text: "9. Что ты слушаешь, когда никто не видит?",
                        type: "single",
                        options: [
                            "🎸 Рок / Инди",
                            "🎹 Классика / Джаз",
                            "🎤 Поп / K-Pop",
                            "🎧 Подкасты и аудиокниги",
                            "🤐 Секретная информация"
                        ],
                        hasOther: true
                    },
                    {
                        id: "q10_weekend",
                        text: "10. Как проводишь выходные?",
                        type: "single",
                        options: [
                            "🛌 Отсыпаюсь",
                            "📚 Читаю / Учусь",
                            "🏃‍♀️ Спорт / Активный отдых",
                            "🎨 Творчество",
                            "🧹 Взрослые дела (увы)"
                        ],
                        hasOther: true
                    }
                ]
            },
            // Экран 4 (вопросы 11-13)
            {
                title: "💭 Блок 4: Ценности и мечты",
                subtitle: "Заглянем чуть глубже",
                questions: [
                    {
                        id: "q11_values",
                        text: "11. Что ты ценишь в людях больше всего? (можно выбрать несколько)",
                        type: "multi",
                        options: [
                            "😂 Чувство юмора",
                            "🤝 Честность и верность",
                            "🧠 Ум и любознательность",
                            "🫂 Эмпатия и доброта",
                            "🔥 Амбиции и страсть к жизни"
                        ],
                        hasOther: true
                    },
                    {
                        id: "q12_moment",
                        text: "12. Если бы можно было жить в любом моменте вечно:",
                        type: "single",
                        options: [
                            "🌅 Рассвет на море",
                            "🎉 Шумная вечеринка с друзьями",
                            "📖 Уютный вечер с книгой и котом",
                            "✈️ Момент в путешествии, когда всё впереди"
                        ],
                        hasOther: true
                    },
                    {
                        id: "q13_life",
                        text: "13. Какое утверждение ближе всего тебе сейчас?",
                        type: "single",
                        options: [
                            "💫 Строю карьеру и кайфую",
                            "🧘 В поиске баланса и гармонии",
                            "🌍 Хочу путешествовать",
                            "🏡 Хочу построить уютный дом и завести собаку",
                            "🎯 Иду к большой цели",
                            "🤷‍♀️ Всё сложно, ещё разбираюсь"
                        ],
                        hasOther: true
                    }
                ]
            },
            // Экран 5 (вопросы 14-17)
            {
                title: "🔍 Блок 5: Шпионские данные",
                subtitle: "Самое важное!",
                questions: [
                    {
                        id: "q14_dream_job",
                        text: "14. Кем ты хотела стать, когда была маленькой?",
                        type: "text",
                        placeholder: "Напиши здесь..."
                    },
                    {
                        id: "q15_birthday",
                        text: "15. 🎂 Когда у тебя день рождения?",
                        type: "date",
                        hint: "Кажется, ты говорила, что скоро 26? Я не мог это пропустить 😏"
                    },
                    {
                        id: "q16_colors",
                        text: "16. Топ-3 твоих любимых цвета (можно выбрать несколько):",
                        type: "multi",
                        options: [
                            "⬜ Белый", "⬛ Чёрный", "🟦 Синий", "🟥 Красный",
                            "🟩 Зелёный", "🟨 Жёлтый", "🟪 Фиолетовый", "🩷 Розовый",
                            "🟧 Оранжевый", "🟫 Коричневый"
                        ],
                        hasOther: true,
                        maxSelect: 3
                    },
                    {
                        id: "q17_no_gift",
                        text: "17. Что тебе точно НЕ стоит дарить?",
                        type: "multi",
                        options: [
                            "💐 Цветы", "🍬 Сладости", "🧸 Мягкие игрушки",
                            "💍 Украшения", "🎁 Любые сюрпризы — я привереда"
                        ],
                        hasOther: true
                    }
                ]
            },
            // Экран 6 (вопросы 18-21)
            {
                title: "🎬 Блок 6: Финишная прямая",
                subtitle: "Последние штрихи",
                questions: [
                    {
                        id: "q18_movies",
                        text: "18. Твои любимые фильмы / сериалы:",
                        type: "text",
                        placeholder: "Можно несколько, через запятую..."
                    },
                    {
                        id: "q19_allergy",
                        text: "19. Есть ли у тебя аллергия или что-то, что я должен знать перед ужином?",
                        type: "text",
                        placeholder: "Например: орехи, молочка, морепродукты..."
                    },
                    {
                        id: "q20_mood",
                        text: "20. Лучший способ поднять тебе настроение:",
                        type: "single",
                        options: [
                            "🌸 Прислать смешной мем",
                            "🎵 Скинуть любимую песню",
                            "🍩 Принести вкусняшку",
                            "🤗 Просто обнять",
                            "🎤 Спою песню (нет, пожалуйста, не надо)"
                        ],
                        hasOther: true
                    },
                    {
                        id: "q21_ask_me",
                        text: "21. Если бы ты могла задать мне любой вопрос, и я бы ответил честно, что бы это было?",
                        type: "text",
                        placeholder: "Твой вопрос..."
                    }
                ]
            }
        ];

        const totalScreens = quizData.length;
        const totalQuestions = quizData.reduce((sum, screen) => sum + screen.questions.length, 0);
        const answers = {};

        // ===== ПОСТРОЕНИЕ ЭКРАНОВ =====
        const screensContainer = document.getElementById('screensContainer');

        quizData.forEach((screenData, screenIdx) => {
            const screenDiv = document.createElement('div');
            screenDiv.className = 'screen' + (screenIdx === 0 ? ' active' : '');
            screenDiv.id = 'screen-' + screenIdx;

            let html = `<span class="emoji-medium">${screenData.title.split(' ')[0]}</span>`;
            html += `<h2>${screenData.title}</h2>`;
            html += `<p class="subtitle">${screenData.subtitle}</p>`;

            screenData.questions.forEach((q) => {
                html += `<div class="question-block" style="margin-bottom: 20px; text-align: left;">`;
                html += `<p style="font-weight: 600; margin-bottom: 10px; color: #4a3f6b;">${q.text}</p>`;

                if (q.hint) {
                    html += `<div class="birthday-hint">${q.hint}</div>`;
                }
                if (q.type === 'date') {
                    html += `<div class="age-diff" id="ageDiff"></div>`;
                }

                if (q.type === 'single') {
                    html += `<div class="quiz-options" data-qid="${q.id}" data-type="single">`;
                    q.options.forEach(opt => {
                        html += `<button class="quiz-option" data-value="${escapeHTML(opt)}" onclick="selectSingle(this, '${q.id}')">${opt}</button>`;
                    });
                    html += `</div>`;
                    if (q.hasOther) {
                        html += `<input type="text" class="other-input" data-qid="${q.id}-other" placeholder="✨ Свой вариант..." oninput="updateOtherForSingle('${q.id}')">`;
                    }
                } else if (q.type === 'multi') {
                    html += `<div class="quiz-options" data-qid="${q.id}" data-type="multi" data-max="${q.maxSelect || 99}">`;
                    q.options.forEach(opt => {
                        html += `<button class="quiz-option" data-value="${escapeHTML(opt)}" onclick="selectMulti(this, '${q.id}', ${q.maxSelect || 99})">${opt}</button>`;
                    });
                    html += `</div>`;
                    if (q.hasOther) {
                        html += `<input type="text" class="other-input" data-qid="${q.id}-other" placeholder="✨ Свой вариант..." oninput="updateOtherForMulti('${q.id}')">`;
                    }
                } else if (q.type === 'text') {
                    html += `<textarea class="text-input" data-qid="${q.id}" placeholder="${q.placeholder || ''}" rows="2"></textarea>`;
                } else if (q.type === 'date') {
                    html += `<input type="date" data-qid="${q.id}" style="margin: 8px 0;" onchange="onDateChange(this)">`;
                }

                html += `</div>`;
            });

            html += `<div style="margin-top: 20px;">`;
            if (screenIdx > 0) {
                html += `<button class="btn btn-next" onclick="prevScreen(${screenIdx})">👈 Назад</button>`;
            }
            if (screenIdx < totalScreens - 1) {
                html += `<button class="btn btn-next" id="btnNext-${screenIdx}" onclick="nextScreen(${screenIdx})" disabled>Дальше 👉</button>`;
            } else {
                html += `<button class="btn btn-submit" id="btnSubmit" onclick="submitForm()" disabled>Отправить анкету 💌</button>`;
            }
            html += `</div>`;

            screenDiv.innerHTML = html;
            screensContainer.appendChild(screenDiv);
        });

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ===== ЛОГИКА ВЫБОРА =====
        function selectSingle(btn, qid) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
            btn.classList.add('selected');
            answers[qid] = btn.dataset.value;

            const otherInput = document.querySelector(`[data-qid="${qid}-other"]`);
            if (otherInput) {
                if (btn.dataset.value.includes('Другое') || btn.dataset.value.includes('Свой вариант')) {
                    otherInput.classList.add('visible');
                    if (otherInput.value) answers[qid] = otherInput.value;
                } else {
                    otherInput.classList.remove('visible');
                    otherInput.value = '';
                }
            }
            checkCurrentScreen();
        }

        function updateOtherForSingle(qid) {
            const otherInput = document.querySelector(`[data-qid="${qid}-other"]`);
            const parent = document.querySelector(`[data-qid="${qid}"][data-type="single"]`);
            if (otherInput && otherInput.value) {
                answers[qid] = otherInput.value;
                if (parent) {
                    parent.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('selected'));
                }
            }
            checkCurrentScreen();
        }

        function selectMulti(btn, qid, maxSelect) {
            const parent = btn.parentElement;
            if (btn.classList.contains('selected')) {
                btn.classList.remove('selected');
            } else {
                const selected = parent.querySelectorAll('.quiz-option.selected');
                if (maxSelect && selected.length >= maxSelect) {
                    selected[0].classList.remove('selected');
                }
                btn.classList.add('selected');
            }
            updateMultiAnswer(qid);
        }

        function updateMultiAnswer(qid) {
            const parent = document.querySelector(`[data-qid="${qid}"][data-type="multi"]`);
            const allSelected = parent ? parent.querySelectorAll('.quiz-option.selected') : [];
            let value = Array.from(allSelected).map(o => o.dataset.value).join(', ');

            const otherInput = document.querySelector(`[data-qid="${qid}-other"]`);
            if (otherInput) {
                const hasOther = Array.from(allSelected).some(o =>
                    o.dataset.value.includes('Другое') || o.dataset.value.includes('Свой вариант')
                );
                if (hasOther) {
                    otherInput.classList.add('visible');
                } else {
                    otherInput.classList.remove('visible');
                }
                if (otherInput.value) {
                    value = value ? value + ' | Свой вариант: ' + otherInput.value : otherInput.value;
                }
            }
            answers[qid] = value || '';
            checkCurrentScreen();
        }

        function updateOtherForMulti(qid) {
            updateMultiAnswer(qid);
        }

        function onDateChange(input) {
            const qid = input.dataset.qid;
            answers[qid] = input.value;
            if (qid === 'q15_birthday' && input.value) {
                showAgeDifference(input.value);
            }
            checkCurrentScreen();
        }

        function showAgeDifference(dateStr) {
            const birthDate = new Date(dateStr);
            const ageDiffDiv = document.getElementById('ageDiff');
            if (!ageDiffDiv || isNaN(birthDate.getTime())) return;

            const diffMs = birthDate.getTime() - MY_BIRTHDAY.getTime();
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffYears = Math.abs(Math.floor(diffDays / 365.25));
            const remainingDays = Math.abs(diffDays) % 365;

            let message = '';
            if (diffDays === 0) {
                message = '😲 Мы родились в один день! Это судьба!';
            } else if (diffDays > 0) {
                message = `Ты старше меня на ${diffYears} ${getYearWord(diffYears)} и ${remainingDays} ${getDayWord(remainingDays)} 👑`;
            } else {
                const absDays = Math.abs(diffDays);
                const absYears = Math.abs(Math.floor(absDays / 365.25));
                const absRemaining = absDays % 365;
                message = `Ты младше меня на ${absYears} ${getYearWord(absYears)} и ${absRemaining} ${getDayWord(absRemaining)} 🌸`;
            }
            ageDiffDiv.textContent = message;
            ageDiffDiv.classList.add('visible');
        }

        function getYearWord(years) {
            if (years % 10 === 1 && years % 100 !== 11) return 'год';
            if ([2, 3, 4].includes(years % 10) && ![12, 13, 14].includes(years % 100)) return 'года';
            return 'лет';
        }

        function getDayWord(days) {
            if (days % 10 === 1 && days % 100 !== 11) return 'день';
            if ([2, 3, 4].includes(days % 10) && ![12, 13, 14].includes(days % 100)) return 'дня';
            return 'дней';
        }

        // Отслеживание текстовых полей
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('text-input')) {
                const qid = e.target.dataset.qid;
                if (qid && !qid.includes('-other')) {
                    answers[qid] = e.target.value;
                }
                checkCurrentScreen();
            }
        });

        function getCurrentScreenIndex() {
            const activeScreen = document.querySelector('.screen.active');
            if (!activeScreen || activeScreen.id === 'screen-final') return 0;
            const id = activeScreen.id;
            const idx = parseInt(id.split('-')[1]);
            return isNaN(idx) ? 0 : idx;
        }

        function checkCurrentScreen() {
            const screenIdx = getCurrentScreenIndex();
            const screenData = quizData[screenIdx];
            if (!screenData) return;
            let allAnswered = true;

            screenData.questions.forEach(q => {
                const val = answers[q.id];
                if (!val || val.trim() === '') allAnswered = false;
            });

            const nextBtn = document.getElementById('btnNext-' + screenIdx);
            const submitBtn = document.getElementById('btnSubmit');
            if (nextBtn) nextBtn.disabled = !allAnswered;
            if (submitBtn) submitBtn.disabled = !allAnswered;
            updateProgress();
        }

        function updateProgress() {
            let completed = 0;
            quizData.forEach((screen, idx) => {
                screen.questions.forEach(q => {
                    if (answers[q.id] && answers[q.id].trim() !== '') completed++;
                });
            });
            const percent = Math.round((completed / totalQuestions) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressLabel').textContent =
                `Прогресс: ${percent}% (вопросов отвечено: ${completed} из ${totalQuestions})`;
        }

        function showScreen(index) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById('screen-' + index);
            if (screen) screen.classList.add('active');
            const finalScreen = document.getElementById('screen-final');
            if (finalScreen) finalScreen.classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function nextScreen(currentIdx) {
            if (currentIdx < totalScreens - 1) {
                showScreen(currentIdx + 1);
                checkCurrentScreen();
            }
        }

        function prevScreen(currentIdx) {
            if (currentIdx > 0) {
                showScreen(currentIdx - 1);
                checkCurrentScreen();
            }
        }

        // ===== ОТПРАВКА ФОРМЫ =====
        function submitForm() {
            const submitBtn = document.getElementById('btnSubmit');
            const overlay = document.getElementById('sendingOverlay');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправляю... 💫';
            overlay.classList.add('visible');

            // Собираем данные
            const formData = new FormData();
            formData.append('_subject', 'Новая анкета! 💌');
            for (const [key, value] of Object.entries(answers)) {
                formData.append(key, value || '(не указано)');
            }

            // Пробуем через fetch
            fetch('https://formspree.io/f/mlgyornw', {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                console.log('Formspree response:', response.status);
                showFinalScreen();
            })
            .catch(error => {
                console.warn('Fetch не сработал, пробуем запасной метод:', error);
                // Запасной метод: создаём временную форму и отправляем
                const tempForm = document.createElement('form');
                tempForm.method = 'POST';
                tempForm.action = 'https://formspree.io/f/mlgyornw';
                tempForm.target = '_blank';
                tempForm.style.display = 'none';
                for (const [key, value] of Object.entries(answers)) {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = key;
                    input.value = value || '(не указано)';
                    tempForm.appendChild(input);
                }
                document.body.appendChild(tempForm);
                tempForm.submit();
                document.body.removeChild(tempForm);
                // Показываем финал с небольшой задержкой
                setTimeout(showFinalScreen, 1500);
            });
        }

        function showFinalScreen() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-final').classList.add('active');
            document.getElementById('sendingOverlay').classList.remove('visible');
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressLabel').textContent = 'Готово! 🎉';
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => launchFireworks(), 500);
        }

        // ===== САЛЮТ =====
        function launchFireworks() {
            const canvas = document.getElementById('fireworkCanvas');
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            const colors = ['#ff9a9e','#fad0c4','#ffb7b2','#ffdac1','#e2f0cb','#b5ead7','#c7ceea','#ffd1dc','#ffe0f0','#ffc3a0','#ff677d','#d4a5a5','#ffdfd3','#fec8d8','#957dad'];
            const particles = [];
            const sparkEmojis = ['✨','💖','🐱','🎉','💫','⭐','🌸','💝'];

            function createFirework(x, y) {
                const count = 40 + Math.floor(Math.random() * 40);
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
                    const velocity = 3 + Math.random() * 8;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1,
                        decay: 0.008 + Math.random() * 0.02,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 2 + Math.random() * 5,
                    });
                }
                for (let i = 0; i < 6; i++) {
                    const sparkEl = document.createElement('span');
                    sparkEl.textContent = sparkEmojis[Math.floor(Math.random() * sparkEmojis.length)];
                    sparkEl.style.cssText = `position:fixed; left:${x}px; top:${y}px; font-size:${18+Math.random()*30}px; pointer-events:none; z-index:10000; animation:sparkleFloat ${1+Math.random()*1.5}s ease-out forwards;`;
                    document.body.appendChild(sparkEl);
                    setTimeout(() => sparkEl.remove(), 2500);
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let alive = false;
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vy += 0.05;
                    p.life -= p.decay;
                    if (p.life <= 0) { particles.splice(i, 1); continue; }
                    alive = true;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                if (alive || particles.length > 0) {
                    requestAnimationFrame(animate);
                } else {
                    canvas.style.display = 'none';
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            const launchPoints = [
                { x: canvas.width * 0.2, y: canvas.height * 0.6 },
                { x: canvas.width * 0.5, y: canvas.height * 0.3 },
                { x: canvas.width * 0.8, y: canvas.height * 0.5 },
                { x: canvas.width * 0.35, y: canvas.height * 0.25 },
                { x: canvas.width * 0.65, y: canvas.height * 0.55 },
            ];
            launchPoints.forEach((pt, i) => setTimeout(() => createFirework(pt.x, pt.y), i * 250));
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    createFirework(
                        Math.random() * canvas.width * 0.8 + canvas.width * 0.1,
                        Math.random() * canvas.height * 0.6 + canvas.height * 0.1
                    );
                }, 1200 + i * 400);
            }
            animate();
        }

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('fireworkCanvas');
            if (canvas.style.display === 'block') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        updateProgress();
        console.log('Анкета готова! Formspree ID: mlgyornw');
        console.log('Если письма не приходят — проверь подтверждение email в Formspree (папка Спам)');
    </script>
</body>
